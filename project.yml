name: LocalHostBar
options:
  bundleIdPrefix: com.localhostbar
  deploymentTarget:
    macOS: "14.0"

targets:
  LocalHostBar:
    type: application
    platform: macOS
    sources:
      - path: LocalHostBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localhostbar.app
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: 3
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
        ENABLE_HARDENED_RUNTIME: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - sdk: ServiceManagement.framework
    info:
      path: LocalHostBar/Info.plist
      properties:
        LSUIElement: true
        NSAppleEventsUsageDescription: "LocalHostBar uses Apple Events to open Terminal in your project directory."
        CFBundleVersion: "2"
        CFBundleShortVersionString: "1.0.1"
        CFBundleName: LocalHostBar
        CFBundleDisplayName: LocalHostBar
        NSUserNotificationAlertStyle: alert
